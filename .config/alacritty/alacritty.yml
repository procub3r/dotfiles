window:
    padding:
        x: 10
        y: 10

font:
    normal:
        family: mononoki
        style: Regular
    bold:
        family: mononoki
        style: Bold
    italic:
        family: mononoki
        style: Italic
    bold_italic:
        family: mononoki
        style: BoldItalic
    size: 12.5

colors:
    primary:
        background: "0x2B313D"
        foreground: "0xe1e3e4"

    normal:
        black: "0x29292a"
        red: "0xff6578"
        green: "0x9dd274"
        yellow: "0xeacb64"
        blue: "0x72cce8"
        magenta: "0xba9cf3"
        cyan: "0x83ddf9"
        white: "0xe1e3e4"

    bright:
        black: "0x292b2d"
        red: "0xff6578"
        green: "0x9dd274"
        yellow: "0xeacb64"
        blue: "0x72cce8"
        magenta: "0xba9cf3"
        cyan: "0x83ddf9"
        white: "0xe1e3e4"

# background_opacity: 0.95

key_bindings:
   - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

