window:
    padding:
        x: 10
        y: 10

font:
    normal:
        family: mononoki
        style: Regular
    bold:
        family: mononoki
        style: Bold
    italic:
        family: mononoki
        style: Italic
    bold_italic:
        family: mononoki
        style: BoldItalic
    size: 12.5

colors:
    primary:
        background: "#2a2f38"
        foreground: "#e1e3e4"

    normal:
        black: "#181a1c"
        red: "#ff6578"
        green: "#9dd274"
        yellow: "#eacb64"
        blue: "#72cce8"
        magenta: "#ba9cf3"
        cyan: "#83ddf9"
        white: "#e1e3e4"

    bright:
        black: "#181a1c"
        red: "#ff6578"
        green: "#9dd274"
        yellow: "#eacb64"
        blue: "#72cce8"
        magenta: "#ba9cf3"
        cyan: "#83ddf9"
        white: "#e1e3e4"

          # background_opacity: 0.85

key_bindings:
    - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

